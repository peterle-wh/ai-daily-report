<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日要闻 - 精心筛选</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #000000;
            --bg-secondary: #1d1d1f;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --text-tertiary: #6e6e73;
            --accent: #2997ff;
            --border: rgba(255,255,255,0.1);
            --shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }
        
        .header-inner {
            max-width: 980px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .nav {
            display: flex;
            gap: 32px;
        }
        
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav a:hover { color: var(--text-primary); }
        
        .main {
            max-width: 980px;
            margin: 0 auto;
            padding: 120px 20px 80px;
        }
        
        .hero {
            text-align: center;
            padding: 60px 0 80px;
        }
        
        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #86868b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p {
            font-size: 24px;
            font-weight: 300;
            color: var(--text-secondary);
        }
        
        .hero .date {
            font-size: 14px;
            color: var(--text-tertiary);
            margin-top: 20px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 80px;
        }
        
        .stat {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat:hover { transform: translateY(-4px); }
        
        .stat-number {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        .section {
            margin-bottom: 100px;
        }
        
        .section-header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .section-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-secondary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .section-title {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .section-count {
            color: var(--text-tertiary);
            font-size: 14px;
        }
        
        .featured {
            background: var(--bg-secondary);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 24px;
            cursor: pointer;
            transition: transform 0.4s, box-shadow 0.4s;
        }
        
        .featured:hover {
            transform: scale(1.01);
            box-shadow: var(--shadow);
        }
        
        .featured-img-wrap {
            height: 360px;
            overflow: hidden;
        }
        
        .featured-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }
        
        .featured:hover .featured-img { transform: scale(1.05); }
        
        .featured-content {
            padding: 32px;
        }
        
        .featured-source {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .featured-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.3;
        }
        
        .featured-desc {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .card {
            background: var(--bg-secondary);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow);
        }
        
        .card-img-wrap {
            height: 180px;
            overflow: hidden;
        }
        
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        
        .card:hover .card-img { transform: scale(1.08); }
        
        .card-content {
            padding: 20px;
        }
        
        .card-source {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .card-title {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        
        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
            font-size: 12px;
            border-top: 1px solid var(--border);
        }
        
        .footer a { color: var(--accent); text-decoration: none; }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 40px; }
            .hero p { font-size: 18px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .grid { grid-template-columns: 1fr; }
            .nav { display: none; }
            .featured-img-wrap { height: 240px; }
            .featured-title { font-size: 22px; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
